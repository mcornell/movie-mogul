name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npx vitest run

  # ── 2. Global build → deploy to Cloudflare preview → E2E ─────────────────────
  #    Builds the API-enabled version, uploads the dist/ as a workflow artifact,
  #    deploys to a Cloudflare Pages preview URL, and runs the full E2E suite
  #    against that URL. The same dist/ is later promoted to production.
  e2e:
    name: E2E (Cloudflare preview)
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:global

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name movie-mogul-game

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run standalone E2E against preview
        run: npx bddgen && npx playwright test --project desktop-chrome --grep-invert "@standalone-only"
        env:
          BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
          CI: 'true'

      - name: Run API E2E against preview
        run: npx bddgen -c playwright.api.config.ts && npx playwright test --config playwright.api.config.ts
        env:
          BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 3. Promote to production ─────────────────────────────────────────────────
  #    Runs only on merge to main. Downloads the exact dist/ that was tested
  #    (no rebuild) and deploys it to the production alias on Cloudflare Pages.
  promote-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name movie-mogul-game --branch main
