name: CI

on:
  push:
    branches: [develop]

jobs:
  # ── 1. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - run: npx vitest run

  # ── 2. Global build → deploy to Cloudflare preview → E2E ─────────────────────
  #    Builds the API-enabled version, uploads the dist/ as a workflow artifact,
  #    deploys to a Cloudflare Pages preview URL, and runs the full E2E suite
  #    against that URL. The same dist/ is later promoted to production.
  e2e:
    name: E2E (Cloudflare preview)
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - run: npm run build:global

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name movie-mogul-game

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Save Playwright browsers cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.playwright-cache.outputs.cache-primary-key }}

      - name: Warm up Cloudflare Worker
        run: |
          curl -sf --retry 5 --retry-delay 3 \
            -X POST "${{ steps.deploy.outputs.deployment-url }}/api/game/start" \
            -H "Content-Type: application/json" -d '{}' || true

      - name: Run API E2E against preview
        run: npx bddgen -c playwright.api.config.ts && npx playwright test --config playwright.api.config.ts
        env:
          BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 3. Open / refresh PR to main ─────────────────────────────────────────────
  #    Creates a PR from develop → main after every green CI run, or updates
  #    the existing open PR's body with the latest commit summary.
  open-pr:
    name: Open / update PR to main
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history needed for git log origin/main..HEAD

      - name: Create or refresh PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(git log origin/main..HEAD --pretty=format:'- %s' --reverse)
          BODY="## Changes

          ${CHANGES}

          ---
          ✅ All CI checks passed · $(date -u +'%Y-%m-%d %H:%M UTC')"

          PR_NUMBER=$(gh pr list --base main --head develop --json number --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base main \
              --head develop \
              --title "Deploy to production" \
              --body "$BODY"
          else
            gh pr edit "$PR_NUMBER" --body "$BODY"
          fi

