name = "movie-mogul-game"
compatibility_date = "2026-04-07"
pages_build_output_dir = "dist"

[placement]
mode = "smart"

[build.environment_variables]
WRANGLER_VERSION = "4"

# Default: local dev and preview deployments use the dev database
[[d1_databases]]
binding = "DB"
database_name = "movie-mogul-scores-dev"
database_id = "d1d06ddc-8bc9-4dda-a9d6-8c1823fc0852"

# Production deployments (main branch) use the production database
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "movie-mogul-scores"
database_id = "cb9da560-b509-4b4e-b872-a75b4ebb335f"
